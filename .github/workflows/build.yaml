name: Build docker
on:
  pull_request:
    branches: ['master']
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'
      - uses: ko-build/setup-ko@v0.8
      - run: |
          ko resolve --push=false -B -f helm-values-template.yaml > helm/values.yaml
