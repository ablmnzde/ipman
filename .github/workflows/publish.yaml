name: Publish docker
on:
  push:
    branches: ['master']
jobs:
  publish:
    env:
      GOFLAGS: '-trimpath -buildvcs=false'
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'
      - uses: ko-build/setup-ko@v0.8
      - run: |
          ko resolve -B -f helm-values-template.yaml > helm/values.yaml
          if [[ `git status --porcelain` ]]; then

            git config --global user.name 'Ipman docker build workflow'
            git config --global user.email 'support@dialo.ai'

            git add helm/values.yaml
            git commit -m "release(docker): update image docker tags"
            git push

          else
            echo "Nothing changed"
          fi
