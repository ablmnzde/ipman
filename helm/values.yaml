# Default values for ipman
# This is a YAML-formatted file.
# Global configuration
global:
  namespace: "ipman-system"
  socketPath: "/var/run/ipman"
  monitoring:
    enabled: false
    interval: 10s
    release: kube-prometheus-stack
# Controller (operator) configuration
controller:
  podTimeoutSeconds: 60
  replicaCount: 1
  image: "ghcr.io/dialohq/ipman/operator@sha256:09ecfcf79232210584b2d8a97021966d4a6cc6fe918401017fa77bc48b451dfd"
  pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
# Caddy proxy configuration
caddy:
  image: "caddy:2.10.0-alpine"
  pullPolicy: "IfNotPresent"
# Restctl service configuration
restctl:
  image: "ghcr.io/dialohq/ipman/restctl@sha256:2b2a5381549c6ed5bfc0bc832d9b20c08dbad8daa6a3c1a6a36fb3a1274ab866"
  pullPolicy: "IfNotPresent"
# Xfrminjector configuration
xfrminjector:
  image: "ghcr.io/dialohq/ipman/xfrminjector@sha256:cf4fad1f7c89a98ade94bb32a5a9a0606bb5fb210b1626cae5c6b94d0c9a9f44"
  pullPolicy: "IfNotPresent"
  ttlSeconds: 120
# VxlanLord configuration
vxlandlord:
  image: "ghcr.io/dialohq/ipman/vxlandlord@sha256:1ba5cecea4a2910fbc6756bde2890575c103f7b2c318e525bda5547d0f6304b8"
  pullPolicy: "IfNotPresent"
# XfrmMinion configuration
xfrminion:
  image: "ghcr.io/dialohq/ipman/xfrminion@sha256:9878b6a172cbfb02be409e0cedc967a9bc29d314c47c3378d2371b5d092bbdb9"
  pullPolicy: "IfNotPresent"
# Charon daemon configuration
charon:
  image: "plan9better/charon:latest-dev"
  pullPolicy: "IfNotPresent"
# Webhook configuration
webhook:
  serviceName: "ipman-webhook-service"
  mutatingWebhookName: "ipman-mutating-webhook"
  validatingWebhookName: "ipman-validating-webhook"
  certificate:
    name: "ipman-webhook-certificate"
    secretName: "ipman-webhook-cert-secret"
    issuerName: "selfsigned-issuer"
  volumes:
    name: "webhook-certs"
    mountPath: "/etc/webhook/certs"
    readOnly: true
# RBAC configuration
rbac:
  clusterRoleName: "ipman-cluster-resource-access"
  clusterRoleBindingName: "ipman-role-binding"
# Service account configuration
serviceAccount:
  annotations: {}
  name: "ipman-service-account"
# Pod configuration
podAnnotations: {}
podLabels: {}
---

